name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Крок для перевірки, де package.json
      - name: Find package.json
        run: |
          if [ -f ./package.json ]; then
            echo "✅ package.json found in root"
            echo "PACKAGE_DIR=." >> $GITHUB_ENV
          elif [ -f ./blog-card/package.json ]; then
            echo "✅ package.json found in ./blog-card"
            echo "PACKAGE_DIR=./blog-card" >> $GITHUB_ENV
          elif [ -f ./client/package.json ]; then
            echo "✅ package.json found in ./client"
            echo "PACKAGE_DIR=./client" >> $GITHUB_ENV
          else
            echo "❌ package.json not found!"
            exit 1
          fi

      - name: Install dependencies
        run: npm install
        working-directory: ${{ env.PACKAGE_DIR }}

      - name: Run build
        run: npm run build || echo "No build script found"
        working-directory: ${{ env.PACKAGE_DIR }}
