<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <!-- Велике фото блогу -->
    <img src="images/photo11.png" alt="Blog preview" class="card__image">

    <div class="card__content">
      <span class="card__category">Категорія</span>
      <small class="card__date">22 вересня 2025</small>

      <h2 class="card__title">Європейський університет</h2>
      <p class="card__description">
        Сучасний заклад освіти в Україні з високим рівнем підготовки студентів.
      </p>

      <div class="card__author">
        <!-- Фото автора -->
        <img src="images/nazariy.png" alt="Author" class="card__author-img">
        <span class="card__author-name">Теличко Назарій</span>
      </div>
    </div>
  </div>
</body>
</html>
